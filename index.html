const { useState, useEffect, useRef } = React;

/* ───────────────────────── VIEWPORT HOOK ───────────────────────── */
function useViewport() {
  const [w, setW] = useState(typeof window !== 'undefined' ? window.innerWidth : 1200);
  useEffect(() => {
    const onResize = () => setW(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  return {
    width: w,
    isPhone: w <= 560,
    isTiny: w <= 380,
    isTablet: w > 560 && w <= 900,
    isMobileOrTablet: w <= 900,
  };
}

/* ───────────────────────── DECRYPT TEXT EFFECT ───────────────────────── */
function Decrypt({ text, trigger, speed = 28, className, style }) {
  const chars = '!<>-_\\/[]{}—=+*^?#________';
  const [out, setOut] = useState(text.replace(/[^\s]/g, '█'));
  const ref = useRef(null);
  useEffect(() => {
    if (!trigger) return;
    let frame = 0;
    const totalFrames = text.length * 2;
    const interval = setInterval(() => {
      frame++;
      let result = '';
      const revealCount = Math.floor((frame / totalFrames) * text.length);
      for (let i = 0; i < text.length; i++) {
        if (text[i] === ' ') { result += ' '; continue; }
        if (i < revealCount) result += text[i];
        else result += chars[Math.floor(Math.random() * chars.length)];
      }
      setOut(result);
      if (revealCount >= text.length) { clearInterval(interval); setOut(text); }
    }, speed);
    return () => clearInterval(interval);
  }, [trigger]);
  return <span ref={ref} className={className} style={style}>{out}</span>;
}

/* ───────────────────────── TICKER ───────────────────────── */
function Ticker() {
  const items = ['JAVA','SPRING BOOT','MYSQL','REACT.JS','HIBERNATE','DSA','REST API','OOP','GIT','NODE.JS'];
  const full = [...items, ...items];
  return (
    <div style={{ borderTop:'1px solid var(--line)', borderBottom:'1px solid var(--line)', background:'var(--panel)', overflow:'hidden', padding:'12px 0' }}>
      <div className="ticker-row" style={{ display:'flex', gap:40, width:'max-content', animation:'ticker 22s linear infinite', fontSize:11, letterSpacing:2, color:'var(--dim)' }}>
        {full.map((t,i) => (
          <span key={i} style={{ display:'flex', alignItems:'center', gap:10 }}>
            <span style={{ color:'var(--trace)' }}>◆</span>{t}
          </span>
        ))}
      </div>
    </div>
  );
}

/* ───────────────────────── STATS ───────────────────────── */
function Stats() {
  const items = [
    {n:'300+', l:'DSA NEUTRALIZED'},
    {n:'5+', l:'INTERNSHIPS LOGGED'},
    {n:'3+', l:'SYSTEMS DEPLOYED'},
    {n:'96%', l:'HSC CLEARANCE'},
  ];
  const { isPhone } = useViewport();
  return (
    <div className="reveal stats-grid" style={{
      borderBottom:'1px solid var(--line)', background:'var(--panel)',
      display: isPhone ? 'grid' : 'flex',
      gridTemplateColumns: isPhone ? 'repeat(2, minmax(0,1fr))' : undefined,
      justifyContent:'center', gap:0, overflow:'hidden',
    }}>
      {items.map((item,i) => (
        <div key={i} className="stat-card" style={{
          flex: isPhone ? undefined : 1,
          padding: isPhone ? '20px 10px' : '30px 22px', textAlign:'center',
          borderRight: isPhone ? (i%2===0 ? '1px solid var(--line)' : 'none') : (i<items.length-1 ? '1px solid var(--line)' : 'none'),
          borderBottom: isPhone && i < 2 ? '1px solid var(--line)' : 'none',
          transition:'background .3s', position:'relative',
        }}
        onMouseEnter={e=>e.currentTarget.style.background='rgba(59,255,176,0.04)'}

        </div>
      ))}
    </div>
  );
}

function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e,i) => { if (e.isIntersecting) setTimeout(()=>e.target.classList.add('vis'), 70*i); });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function App() {
  const [booted, setBooted] = useState(false);
  const [revealed, setRevealed] = useState(false);
  useReveal();
  useEffect(() => {
    if (booted) setTimeout(() => setRevealed(true), 80);
  }, [booted]);
  return (
    <>
      {!booted && <BootSequence onDone={() => setBooted(true)} />}
      <Nav />
      <Hero revealed={revealed} />
      <Ticker />
      <Stats />
      <Skills />
      <Projects />
      <Experience />
      <Certifications />
      <Achievements />
      <Contact />
      <Footer />
    </>
  );
}
